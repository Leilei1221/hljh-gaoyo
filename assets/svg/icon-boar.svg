  <path d="M10,63 Q12,68 10,73" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M14,63 Q16,70 14,76" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>


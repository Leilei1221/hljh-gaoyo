<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="boarBodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4A3828"/>

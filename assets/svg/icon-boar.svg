  <ellipse cx="8" cy="58" rx="7.5" ry="6" fill="#9A9A8A"/>
  <!-- 鼻孔 -->
  <ellipse cx="5.5" cy="57" rx="2.5" ry="3" fill="#4A4040"/>
  <ellipse cx="10.5" cy="57" rx="2.5" ry="3" fill="#4A4040"/>


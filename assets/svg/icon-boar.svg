  <g fill="none" stroke="#3A2C1C" stroke-width="1" opacity="0.4">
    <path d="M28,55 Q40,52 52,54 Q64,56 76,54"/>
    <path d="M26,62 Q38,59 52,61 Q66,63 78,61"/>
    <path d="M28,70 Q40,67 52,69 Q64,71 76,69"/>
  </g>
  <!-- 背脊剛毛（直立） -->
  <g stroke="#1A1208" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="28" y1="45" x2="26" y2="38"/>
    <line x1="36" y1="43" x2="34" y2="36"/>
    <line x1="44" y1="42" x2="42" y2="35"/>
    <line x1="52" y1="42" x2="50" y2="35"/>
    <line x1="60" y1="43" x2="58" y2="36"/>
    <line x1="68" y1="44" x2="67" y2="37"/>

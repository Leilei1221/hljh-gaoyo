  <ellipse cx="19" cy="49" rx="7" ry="6" fill="#504030" opacity="0.5"/>

  <!-- 耳朵（小） -->
  <ellipse cx="15" cy="42" rx="5" ry="7" fill="#3C2C1C" transform="rotate(-15, 15, 42)"/>
  <ellipse cx="15" cy="42" rx="3" ry="5" fill="#6A4A3A" opacity="0.5" transform="rotate(-15, 15, 42)"/>
  <ellipse cx="33" cy="42" rx="5" ry="7" fill="#3C2C1C" transform="rotate(10, 33, 42)"/>
  <ellipse cx="33" cy="42" rx="3" ry="5" fill="#6A4A3A" opacity="0.5" transform="rotate(10, 33, 42)"/>


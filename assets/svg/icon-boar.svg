  <circle cx="22" cy="52" r="2.5" fill="#0A0A0A"/>
  <circle cx="20.8" cy="50.8" r="1.2" fill="white"/>

  <!-- 短腿 -->
  <!-- 前腿 -->
  <rect x="28" y="84" width="10" height="14" fill="#2A2018" rx="4"/>
  <rect x="42" y="84" width="10" height="14" fill="#2A2018" rx="4"/>
  <!-- 後腿 -->
  <rect x="60" y="82" width="10" height="14" fill="#2A2018" rx="4"/>
  <rect x="74" y="84" width="10" height="12" fill="#2A2018" rx="4"/>
  <!-- 蹄 -->
  <ellipse cx="33" cy="98" rx="5.5" ry="3" fill="#1A1008" />
  <ellipse cx="47" cy="98" rx="5.5" ry="3" fill="#1A1008"/>
  <ellipse cx="65" cy="96" rx="5.5" ry="3" fill="#1A1008"/>
  <ellipse cx="79" cy="96" rx="5.5" ry="3" fill="#1A1008"/>


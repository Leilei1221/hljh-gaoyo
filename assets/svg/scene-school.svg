<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8DC87A"/>
      <stop offset="100%" stop-color="#6AAD58"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EDE0"/>
      <stop offset="100%" stop-color="#E8D8C2"/>
    </linearGradient>
  </defs>

  <!-- 草地（波浪邊緣） -->
  <path d="M0,165 Q60,155 120,160 Q180,165 240,158 Q300,151 360,158 Q420,165 480,158 Q540,151 600,158 Q660,165 720,158 Q780,151 840,158 Q900,165 960,158 Q1020,151 1080,158 Q1140,165 1200,158 L1200,200 L0,200 Z"
        fill="url(#grassGrad)"/>
  <!-- 草地細節線條 -->
  <g opacity="0.3">
    <line x1="80" y1="168" x2="80" y2="180" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="200" y1="165" x2="200" y2="177" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="350" y1="168" x2="350" y2="178" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="500" y1="166" x2="500" y2="176" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="650" y1="168" x2="650" y2="178" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="800" y1="165" x2="800" y2="177" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="950" y1="168" x2="950" y2="180" stroke="#5A9A48" stroke-width="1.5"/>
    <line x1="1100" y1="165" x2="1100" y2="177" stroke="#5A9A48" stroke-width="1.5"/>
  </g>

  <!-- 花蓮高中校舍 -->
  <!-- 左翼棟 -->
  <g transform="translate(240, 60)">
    <rect x="0" y="20" width="180" height="120" fill="url(#wallGrad)" rx="3"/>
    <!-- 屋頂 -->
    <polygon points="-8,20 90,0 188,20" fill="#B5533C"/>
    <!-- 窗戶 -->
    <rect x="15" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="55" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="100" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="140" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="15" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="55" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="100" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="140" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <!-- 廊道 -->
    <rect x="0" y="102" width="180" height="10" fill="#D4C8A8" opacity="0.5"/>
  </g>

  <!-- 主棟（較高） -->
  <g transform="translate(420, 20)">
    <rect x="0" y="20" width="260" height="150" fill="url(#wallGrad)" rx="3"/>
    <!-- 屋頂 -->
    <polygon points="-10,20 130,0 270,20" fill="#B5533C"/>
    <line x1="130" y1="0" x2="130" y2="20" stroke="#943020" stroke-width="2" opacity="0.4"/>
    <!-- 3樓窗 -->
    <rect x="20" y="30" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="65" y="30" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="110" y="30" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="155" y="30" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="200" y="30" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <!-- 2樓窗 -->
    <rect x="20" y="64" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="65" y="64" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="110" y="64" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="155" y="64" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="200" y="64" width="30" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <!-- 1樓廊道 -->
    <rect x="0" y="116" width="260" height="12" fill="#D4C8A8" opacity="0.5"/>
    <!-- 1樓門廊 -->
    <rect x="90" y="95" width="80" height="75" fill="#C8A870" opacity="0.4" rx="3"/>
    <rect x="100" y="95" width="25" height="75" fill="#B8985A" opacity="0.3" rx="2"/>
    <rect x="135" y="95" width="25" height="75" fill="#B8985A" opacity="0.3" rx="2"/>
    <!-- 旗桿 -->
    <line x1="130" y1="-20" x2="130" y2="20" stroke="#888" stroke-width="2"/>
    <rect x="114" y="-20" width="28" height="18" fill="#E44020" rx="2"/>
    <rect x="118" y="-18" width="8" height="14" fill="#FFD700"/>
  </g>

  <!-- 右翼棟 -->
  <g transform="translate(680, 60)">
    <rect x="0" y="20" width="180" height="120" fill="url(#wallGrad)" rx="3"/>
    <polygon points="-8,20 90,0 188,20" fill="#B5533C"/>
    <rect x="15" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="55" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="100" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="140" y="35" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="15" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="55" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="100" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="140" y="68" width="28" height="22" fill="#88AECE" rx="2" opacity="0.8"/>
    <rect x="0" y="102" width="180" height="10" fill="#D4C8A8" opacity="0.5"/>
  </g>

  <!-- 校門（中央） -->
  <g transform="translate(490, 140)">
    <!-- 左柱 -->
    <rect x="0" y="-40" width="18" height="60" fill="#D4C090" rx="3"/>
    <rect x="-3" y="-40" width="24" height="8" fill="#C4B080" rx="2"/>
    <!-- 右柱 -->
    <rect x="180" y="-40" width="18" height="60" fill="#D4C090" rx="3"/>
    <rect x="177" y="-40" width="24" height="8" fill="#C4B080" rx="2"/>
    <!-- 橫樑 -->
    <rect x="0" y="-45" width="198" height="14" fill="#C8B07A" rx="3"/>
    <!-- 校名文字 -->
    <text x="99" y="-35" text-anchor="middle" fill="#6B3A1A" font-size="10"
          font-family="'Noto Serif TC', serif" font-weight="700">國立花蓮高級中學</text>
    <!-- 門扇 -->
    <rect x="18" y="-10" width="76" height="30" fill="#B8A070" rx="2" opacity="0.5"/>
    <rect x="104" y="-10" width="76" height="30" fill="#B8A070" rx="2" opacity="0.5"/>
  </g>

  <!-- 台灣欒樹（左） -->
  <g transform="translate(130, 80)">
    <rect x="-5" y="30" width="10" height="90" fill="#8B6A3A" rx="4"/>
    <ellipse cx="0" cy="28" rx="38" ry="32" fill="#D4A020" opacity="0.9"/>
    <ellipse cx="0" cy="22" rx="30" ry="26" fill="#E8B830" opacity="0.7"/>
    <!-- 花朵點綴 -->
    <circle cx="-15" cy="20" r="4" fill="#E8541A" opacity="0.6"/>
    <circle cx="10" cy="15" r="3" fill="#E8541A" opacity="0.6"/>
    <circle cx="-5" cy="32" r="3.5" fill="#E8541A" opacity="0.6"/>
  </g>

  <!-- 台灣欒樹（右） -->
  <g transform="translate(920, 85)">
    <rect x="-5" y="30" width="10" height="85" fill="#8B6A3A" rx="4"/>
    <ellipse cx="0" cy="28" rx="36" ry="30" fill="#D4A020" opacity="0.9"/>
    <ellipse cx="0" cy="22" rx="28" ry="24" fill="#E8B830" opacity="0.7"/>
    <circle cx="12" cy="18" r="4" fill="#E8541A" opacity="0.6"/>
    <circle cx="-10" cy="25" r="3" fill="#E8541A" opacity="0.6"/>
    <circle cx="4" cy="34" r="3.5" fill="#E8541A" opacity="0.6"/>
  </g>

  <!-- 台灣黑熊（站在校門前） -->
  <g class="animate-breathe" transform="translate(600, 120)" style="transform-origin: 0px 45px;">
    <!-- 身體 -->
    <ellipse cx="0" cy="30" rx="16" ry="18" fill="#2C2C2C"/>
    <!-- 胸部月牙紋 -->
    <path d="M-8,16 Q0,8 8,16 Q4,22 0,22 Q-4,22 -8,16" fill="#D4A820" opacity="0.9"/>
    <!-- 頭 -->
    <circle cx="0" cy="6" r="15" fill="#2C2C2C"/>
    <!-- 耳朵 -->
    <circle cx="-11" cy="-5" r="6" fill="#2C2C2C"/>
    <circle cx="-11" cy="-5" r="3.5" fill="#3C3C3C"/>
    <circle cx="11" cy="-5" r="6" fill="#2C2C2C"/>
    <circle cx="11" cy="-5" r="3.5" fill="#3C3C3C"/>
    <!-- 眼睛 -->
    <circle cx="-5" cy="4" r="4" fill="white"/>
    <circle cx="5" cy="4" r="4" fill="white"/>
    <circle cx="-5" cy="4.5" r="2.2" fill="#1A1A1A"/>
    <circle cx="5" cy="4.5" r="2.2" fill="#1A1A1A"/>
    <circle cx="-4.2" cy="3.8" r="0.8" fill="white"/>
    <circle cx="5.8" cy="3.8" r="0.8" fill="white"/>
    <!-- 鼻子 -->
    <ellipse cx="0" cy="9" rx="3" ry="2" fill="#4A3030"/>
    <!-- 嘴 -->
    <path d="M-3,12 Q0,15 3,12" fill="none" stroke="#4A3030" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 腿 -->
    <rect x="-12" y="44" width="8" height="14" fill="#2C2C2C" rx="4"/>
    <rect x="4" y="44" width="8" height="14" fill="#2C2C2C" rx="4"/>
    <!-- 腳掌 -->
    <ellipse cx="-8" cy="58" rx="6" ry="3" fill="#3C3030"/>
    <ellipse cx="8" cy="58" rx="6" ry="3" fill="#3C3030"/>
    <!-- 手 -->
    <ellipse cx="-18" cy="28" rx="5" ry="7" fill="#2C2C2C" transform="rotate(-15, -18, 28)"/>
    <ellipse cx="18" cy="28" rx="5" ry="7" fill="#2C2C2C" transform="rotate(15, 18, 28)"/>
    <!-- 尾巴 -->
    <ellipse cx="15" cy="44" rx="4" ry="3" fill="#3C3C3C"/>
  </g>

  <!-- 台灣藍鵲（左側外，飛行中） -->
  <g class="flying-bird" style="top: 50px; left: 0;">
    <!-- 頭（棕紅） -->
    <ellipse cx="14" cy="12" rx="10" ry="9" fill="#8B3A1A"/>
    <!-- 身體（鈷藍） -->
    <ellipse cx="28" cy="16" rx="18" ry="10" fill="#4472C4"/>
    <!-- 翅膀展開 -->
    <path d="M14,10 Q20,-5 36,4 Q28,10 20,14Z" fill="#3560B0"/>
    <path d="M42,12 Q54,-2 64,8 Q56,14 46,16Z" fill="#3560B0"/>
    <!-- 眼睛白環 -->
    <circle cx="10" cy="11" r="4" fill="white"/>
    <circle cx="10" cy="11" r="2.2" fill="#2C2C2C"/>
    <circle cx="9.2" cy="10.2" r="0.7" fill="white"/>
    <!-- 嘴 -->
    <path d="M2,13 L-2,11 L2,15" fill="#E8A020"/>
    <!-- 長尾羽 -->
    <path d="M46,18 Q60,18 72,22 Q82,26 88,24" fill="none" stroke="#4472C4" stroke-width="3" stroke-linecap="round"/>
    <path d="M46,18 Q62,20 76,28 Q86,34 92,32" fill="none" stroke="#3560B0" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M46,18 Q58,22 68,28 Q76,34 80,38" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <!-- 尾端白斑 -->
    <ellipse cx="90" cy="23" rx="5" ry="2" fill="white" opacity="0.8"/>
  </g>
</svg>

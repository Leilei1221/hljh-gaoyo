<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="catBodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#D4835A"/>
      <stop offset="100%" stop-color="#B86840"/>
    </radialGradient>
  </defs>

  <!-- 陰影 -->
  <ellipse cx="50" cy="96" rx="26" ry="4" fill="rgba(0,0,0,0.12)"/>

  <!-- 尾巴（條紋） -->
  <path d="M65,72 Q78,68 82,58 Q84,50 80,44" fill="none" stroke="#C07050" stroke-width="8" stroke-linecap="round"/>
  <path d="M65,72 Q78,68 82,58 Q84,50 80,44" fill="none" stroke="#1A1A1A" stroke-width="3"
        stroke-dasharray="4,5" stroke-linecap="round" opacity="0.6"/>

  <!-- 身體 -->
  <ellipse cx="48" cy="68" rx="22" ry="18" fill="url(#catBodyGrad)"/>
  <!-- 腹部（淺色） -->
  <ellipse cx="48" cy="70" rx="13" ry="12" fill="#F0C0A0" opacity="0.6"/>

  <!-- 斑點（不規則） -->
  <g fill="#2A1A0A" opacity="0.65">
    <ellipse cx="35" cy="60" rx="4" ry="3" transform="rotate(-20, 35, 60)"/>
    <ellipse cx="52" cy="58" rx="3.5" ry="2.5" transform="rotate(15, 52, 58)"/>
    <ellipse cx="62" cy="63" rx="3" ry="2.5" transform="rotate(-10, 62, 63)"/>
    <ellipse cx="40" cy="72" rx="3.5" ry="3" transform="rotate(5, 40, 72)"/>
    <ellipse cx="58" cy="74" rx="3" ry="2.5" transform="rotate(-15, 58, 74)"/>
    <ellipse cx="48" cy="64" rx="2.5" ry="2" transform="rotate(10, 48, 64)"/>
  </g>

  <!-- 頭 -->
  <circle cx="48" cy="42" r="20" fill="#C87858"/>
  <!-- 頭部斑點 -->
  <g fill="#2A1A0A" opacity="0.55">
    <ellipse cx="38" cy="36" rx="3" ry="2.2" transform="rotate(-15, 38, 36)"/>
    <ellipse cx="56" cy="35" rx="3" ry="2.2" transform="rotate(10, 56, 35)"/>
    <ellipse cx="42" cy="46" rx="2.5" ry="1.8"/>
    <ellipse cx="54" cy="46" rx="2.5" ry="1.8"/>
  </g>

  <!-- 耳朵（尖立） -->
  <!-- 左耳 -->
  <polygon points="30,28 34,14 42,28" fill="#C87858"/>
  <polygon points="32,27 34,17 40,27" fill="#F0A090" opacity="0.8"/>
  <!-- 耳尖毛 -->
  <line x1="34" y1="14" x2="33" y2="9" stroke="#2A1A0A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 右耳 -->
  <polygon points="54,28 62,14 66,28" fill="#C87858"/>
  <polygon points="56,27 62,17 64,27" fill="#F0A090" opacity="0.8"/>
  <line x1="62" y1="14" x2="63" y2="9" stroke="#2A1A0A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 眼睛（黃色） -->
  <circle cx="40" cy="41" r="6.5" fill="white"/>
  <circle cx="56" cy="41" r="6.5" fill="white"/>
  <circle cx="40" cy="41" r="5" fill="#D4A820"/>
  <circle cx="56" cy="41" r="5" fill="#D4A820"/>
  <!-- 瞳孔（垂直） -->
  <ellipse cx="40" cy="41" rx="2" ry="4.5" fill="#1A1A1A"/>
  <ellipse cx="56" cy="41" rx="2" ry="4.5" fill="#1A1A1A"/>
  <circle cx="38.8" cy="39.5" r="1.2" fill="white"/>
  <circle cx="54.8" cy="39.5" r="1.2" fill="white"/>

  <!-- 鼻子（寬） -->
  <path d="M43,50 Q48,46 53,50 Q51,54 48,55 Q45,54 43,50" fill="#E06060"/>
  <!-- 鼻孔 -->
  <circle cx="45" cy="51" r="1.2" fill="#C04040"/>
  <circle cx="51" cy="51" r="1.2" fill="#C04040"/>

  <!-- 鬍鬚 -->
  <line x1="48" y1="52" x2="30" y2="48" stroke="#888" stroke-width="0.8" opacity="0.7"/>
  <line x1="48" y1="53" x2="30" y2="53" stroke="#888" stroke-width="0.8" opacity="0.7"/>
  <line x1="48" y1="54" x2="30" y2="58" stroke="#888" stroke-width="0.8" opacity="0.7"/>
  <line x1="48" y1="52" x2="66" y2="48" stroke="#888" stroke-width="0.8" opacity="0.7"/>
  <line x1="48" y1="53" x2="66" y2="53" stroke="#888" stroke-width="0.8" opacity="0.7"/>
  <line x1="48" y1="54" x2="66" y2="58" stroke="#888" stroke-width="0.8" opacity="0.7"/>

  <!-- 嘴 -->
  <path d="M44,56 Q48,60 52,56" fill="none" stroke="#C04040" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="55" x2="48" y2="57" stroke="#C04040" stroke-width="1.5"/>

  <!-- 腿（坐姿） -->
  <!-- 前腿 -->
  <ellipse cx="36" cy="82" rx="7" ry="10" fill="#C07050" transform="rotate(-5, 36, 82)"/>
  <ellipse cx="60" cy="82" rx="7" ry="10" fill="#C07050" transform="rotate(5, 60, 82)"/>
  <!-- 腳掌 -->
  <ellipse cx="35" cy="90" rx="7" ry="4" fill="#D4906A"/>
  <ellipse cx="61" cy="90" rx="7" ry="4" fill="#D4906A"/>
</svg>
